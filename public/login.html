<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - Production Control System</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1>Admin Login</h1>
      <p class="auth-subtitle">
        Sign in to access the Production Control System
      </p>

      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter username" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter password" required />
        </div>

        <button type="submit" class="primary-btn full-width">Login</button>

        <p id="loginMessage" class="form-message"></p>
      </form>

      <div class="login-help">
        <p><strong>Default Admin Account</strong></p>
        <p>Username: admin</p>
        <p>Password: admin123</p>
      </div>

      <div class="back-link-wrap">
        <a href="/" class="text-link">Back to Home</a>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
